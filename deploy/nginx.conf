server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # once-simulator — separate container on the shared `once-net` network.
    # /learner/simulator/* is reverse-proxied to it with the prefix stripped:
    #   /learner/simulator/            -> once-simulator:/
    #   /learner/simulator/assets/x.js -> once-simulator:/assets/x.js
    # The trailing slash is required so the simulator's relative asset paths
    # (Vite base: './') resolve under /learner/simulator/.
    location = /learner/simulator {
        return 308 /learner/simulator/;
    }

    location /learner/simulator/ {
        # Docker embedded DNS, resolved per-request so this container can start
        # before once-simulator-web exists and survive its restarts.
        resolver 127.0.0.11 valid=10s;
        set $once_simulator once-simulator-web:80;

        rewrite ^/learner/simulator/(.*)$ /$1 break;

        proxy_pass http://$once_simulator;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hashed Vite assets — cache forever, served from /assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every unknown route returns index.html
    location / {
        add_header Cache-Control "no-store";
        try_files $uri $uri/ /index.html;
    }
}
